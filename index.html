<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panda Video — Listar Vídeos e Pastas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      color: #888;
      font-size: 0.875rem;
      margin-bottom: 32px;
    }

    .form-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.875rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: #f05a28; }

    button {
      background: #f05a28;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 10px 22px;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button:hover { background: #d94e20; }
    button:disabled { background: #555; cursor: not-allowed; }

    .status {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 16px;
      min-height: 18px;
    }

    .error { color: #f87171; }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
    }

    .stat {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px 18px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f05a28;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #888;
      margin-top: 2px;
    }

    /* Results */
    .results { display: flex; flex-direction: column; gap: 28px; }

    .folder-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
    }

    .folder-name {
      font-weight: 700;
      font-size: 1rem;
      color: #fff;
    }

    .folder-id {
      font-family: monospace;
      font-size: 0.75rem;
      color: #f05a28;
    }

    .video-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-left: 12px;
      border-left: 2px solid #2a2a2a;
    }

    .video-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
    }

    .video-id {
      font-family: monospace;
      color: #aaa;
    }

    .video-size {
      font-size: 0.75rem;
      color: #555;
      margin-left: 6px;
    }

    .folder-size {
      font-size: 0.75rem;
      color: #888;
      margin-left: auto;
    }

  </style>
</head>
<body>
  <div class="container">
    <h1>Panda Video — Vídeos e Pastas</h1>
    <p class="subtitle">Insira sua API key para listar todos os vídeos e pastas da sua conta.</p>

    <div class="form-row">
      <input type="text" id="apiKey" placeholder="Sua API key da Panda Video..." />
      <button id="btnBuscar" onclick="buscar()">Buscar</button>
    </div>

    <div class="status" id="status"></div>
    <div id="btnExportWrapper" style="display:none; margin-bottom:16px;">
      <button onclick="exportarExcel()">Baixar Excel</button>
    </div>
    <div class="stats" id="stats" style="display:none">
      <div class="stat">
        <div class="stat-value" id="totalVideos">0</div>
        <div class="stat-label">Vídeos</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="totalPastas">0</div>
        <div class="stat-label">Pastas</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="totalStorage">0 TB</div>
        <div class="stat-label">Armazenamento</div>
      </div>
    </div>
    <div class="results" id="results"></div>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="index.js"></script>
</body>
</html>
